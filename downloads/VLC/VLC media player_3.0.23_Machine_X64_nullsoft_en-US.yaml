Description: "VLC is a free and open source cross-platform multimedia player and framework\nthat
  plays most multimedia files as well as DVDs, Audio CDs, VCDs, and various\nstreaming
  protocols.\n\nSimple, fast and powerful\n  Plays everything - Files, Discs, Webcams,
  Devices and Streams.\n  Plays most codecs with no codec packs needed - MPEG-2, MPEG-4,
  H.264, MKV, WebM,\n    WMV, MP3...\n  Runs on all platforms - Windows, Linux, Mac
  OS X, Unix, iOS, Android ...\n  Completely Free - no spyware, no ads and no user
  tracking."
ShortDescription: VLC is a free and open source cross-platform multimedia player and
  framework that plays most multimedia files, and various streaming protocols.
