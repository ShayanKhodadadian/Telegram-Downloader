name: 🕵️‍♂️ Find and Download Windows App

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Enter the name of the application (e.g., "VLC", "7-Zip", "PowerToys")'
        required: true
        default: 'VLC'

jobs:
  find-download-and-upload:
    runs-on: windows-latest

    steps:
      - name: 🛒 Checkout repository
        uses: actions/checkout@v4

      # ✅ Update Winget from GitHub (to ensure download command exists)
      - name: 🔄 Update Winget from GitHub
        shell: pwsh
        run: |
          $wingetUrl = "https://github.com/microsoft/winget-cli/releases/latest/download/Microsoft.DesktopAppInstaller_8wekyb3d8bbwe.msixbundle"
          $out = "$env:TEMP\winget.msixbundle"
          Invoke-WebRequest $wingetUrl -OutFile $out
          Add-AppxPackage -Path $out

      - name: 🔎 Find Application ID (JSON safe)
        id: find_id
        shell: pwsh
        run: |
          $appName = "${{ inputs.app_name }}"
          Write-Host "Searching for app ID for '$appName'..."
          
          $json = winget search --name "$appName" --source winget --accept-source-agreements --disable-interactivity --output json | ConvertFrom-Json
          
          if ($null -eq $json.Data -or $json.Data.Count -eq 0) {
            Write-Error "No package found for '$appName' in winget source."
            exit 1
          }

          $pkg = $json.Data | Select-Object -First 1
          $appId = $pkg.PackageIdentifier
          
          if ([string]::IsNullOrWhiteSpace($appId)) {
            Write-Error "Could not extract App ID from search result."
            exit 1
          }

          Write-Host "✅ Found App ID: $appId"
          echo "APP_ID_FOUND=$appId" >> $env:GITHUB_OUTPUT

      - name: 📦 Create Download Directory
        shell: pwsh
        run: |
          $appName = "${{ inputs.app_name }}"
          $safeName = $appName -replace '[\\/:*?"<>|]', '_'
          $dir = Join-Path $env:GITHUB_WORKSPACE "downloads\$safeName"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          echo "APP_FOLDER=$dir" >> $env:GITHUB_OUTPUT

      - name: 🔽 Download the Application Installer
        shell: pwsh
        run: |
          $id = "${{ steps.find_id.outputs.APP_ID_FOUND }}"
          $dir = "${{ steps.create_downloads.outputs.APP_FOLDER }}"
          if (-not $dir) {
            $appName = "${{ inputs.app_name }}"
            $safeName = $appName -replace '[\\/:*?"<>|]', '_'
            $dir = Join-Path $env:GITHUB_WORKSPACE "downloads\$safeName"
          }
          Write-Host "Downloading installer for ID: $id"
          winget download --id "$id" --source winget --accept-package-agreements --accept-source-agreements --disable-interactivity --download-directory "$dir"

      - name: 🧱 Zip & Split if >45MB
        shell: pwsh
        run: |
          $appName = "${{ inputs.app_name }}"
          $safeName = $appName -replace '[\\/:*?"<>|]', '_'
          $dir = Join-Path $env:GITHUB_WORKSPACE "downloads\$safeName"
          $maxSize = 45MB
          $zipPath = Join-Path $dir "$safeName.zip"

          Compress-Archive -Path "$dir\*" -DestinationPath $zipPath -Force

          $zipInfo = Get-Item $zipPath
          if ($zipInfo.Length -le $maxSize) {
            Write-Host "ZIP size is under 45MB. No split needed."
            exit 0
          }

          function Split-File {
            param([string]$Path, [int64]$ChunkSize)
            $bytes = [System.IO.File]::ReadAllBytes($Path)
            $total = [math]::Ceiling($bytes.Length / $ChunkSize)
            for ($i=0; $i -lt $total; $i++) {
              $offset = $i * $ChunkSize
              $len = [math]::Min($ChunkSize, $bytes.Length - $offset)
              $chunk = New-Object byte[] $len
              [Array]::Copy($bytes, $offset, $chunk, 0, $len)
              $partPath = "{0}.part{1:00}" -f $Path, ($i+1)
              [System.IO.File]::WriteAllBytes($partPath, $chunk)
            }
            Remove-Item $Path
          }

          Split-File -Path $zipPath -ChunkSize $maxSize
          Write-Host "ZIP split into 45MB parts."

      - name: 📤 Upload Installer as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-installer-${{ inputs.app_name }}
          path: downloads/
