name: 🕵️‍♂️ Find and Download Windows App

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Enter the name of the application to search and download (e.g., "7-Zip", "VLC", "PowerToys")'
        required: true
        default: '7-Zip'

jobs:
  find-download-and-upload:
    runs-on: windows-latest

    steps:
      - name: 🛒 Checkout repository
        uses: actions/checkout@v4

      - name: 🔎 Find Application ID from Name
        id: find_id
        shell: pwsh
        run: |
          echo "Searching for app ID for '${{ inputs.app_name }}'..."
          # Winget can have a progress bar which clutters the output, so we disable it.
          # We search only in the 'winget' source to avoid potential msstore API errors.
          $searchResult = winget search "${{ inputs.app_name }}" --source winget --accept-source-agreements --disable-interactivity
          
          # The output has a header and a line of '---', so we skip the first 2 lines.
          $firstResultLine = $searchResult.Split([System.Environment]::NewLine) | Select-Object -Skip 2 | Select-Object -First 1
          
          if ($null -ne $firstResultLine -and $firstResultLine.Trim() -ne "") {
            # Split by 2 or more whitespace characters to correctly separate columns.
            $columns = $firstResultLine -split '\s{2,}' | ForEach-Object { $_.Trim() }
            $appId = $columns[1] # The second column is the ID.
            
            if ($null -ne $appId -and $appId.Trim() -ne "") {
              echo "✅ Found App ID: $appId"
              echo "APP_ID_FOUND=$appId" >> $env:GITHUB_OUTPUT
            } else {
              echo "::error::Could not parse the App ID from the search result line: '$firstResultLine'"
              exit 1
            }
          } else {
            echo "::error::Could not find any app matching the name '${{ inputs.app_name }}' in the winget source."
            exit 1
          }

      - name: 📦 Create Download Directory
        run: mkdir downloads

      - name: 🔽 Download the Application Installer
        if: steps.find_id.outputs.APP_ID_FOUND
        shell: pwsh
        run: |
          echo "Downloading installer for ID: ${{ steps.find_id.outputs.APP_ID_FOUND }}"
          winget download --id "${{ steps.find_id.outputs.APP_ID_FOUND }}" --source winget --accept-package-agreements --disable-interactivity --download-directory ./downloads
      
      - name: 📤 Upload Installer as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-installer-${{ inputs.app_name }}
          path: downloads/
