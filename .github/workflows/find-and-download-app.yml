name: рЯХµпЄПвАНвЩВпЄП Find and Download Windows App

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Enter the name of the application (e.g., "VLC", "7-Zip", "PowerToys")'
        required: true
        default: 'VLC'

jobs:
  find-download-and-upload:
    runs-on: windows-latest

    steps:
      - name: рЯЫТ Checkout repository
        uses: actions/checkout@v4

      - name: рЯФД Update Winget (from GitHub)
        shell: pwsh
        run: |
          $wingetUrl = "https://github.com/microsoft/winget-cli/releases/latest/download/Microsoft.DesktopAppInstaller_8wekyb3d8bbwe.msixbundle"
          $out = "$env:TEMP\winget.msixbundle"
          Invoke-WebRequest $wingetUrl -OutFile $out
          Add-AppxPackage -Path $out

      - name: рЯФО Find Application ID (JSON if supported, fallback to text)
        id: find_id
        shell: pwsh
        run: |
          $appName = "${{ inputs.app_name }}"
          Write-Host "Searching for app ID for '$appName'..."

          $help = winget search --help 2>&1 | Out-String
          $hasJsonOutput = $help -match "--output"

          if ($hasJsonOutput) {
            # JSON mode
            $jsonFile = Join-Path $env:TEMP "winget_search.json"
            $errFile  = Join-Path $env:TEMP "winget_search.err"

            winget search --name "$appName" --source winget --accept-source-agreements --disable-interactivity --output json 1> $jsonFile 2> $errFile

            $jsonText = Get-Content $jsonFile -Raw
            if ([string]::IsNullOrWhiteSpace($jsonText)) {
              Write-Error "winget returned empty JSON. STDERR:`n$(Get-Content $errFile -Raw)"
              exit 1
            }

            $jsonText = $jsonText -replace "^\uFEFF", ""
            $jsonText = $jsonText -replace "`e\[[0-9;]*[A-Za-z]", ""

            try {
              $json = $jsonText | ConvertFrom-Json
            } catch {
              Write-Error "JSON parse failed. Raw JSON:`n$jsonText"
              exit 1
            }

            $data = $null
            if ($null -ne $json.Data) { $data = $json.Data }
            elseif ($null -ne $json.Packages) { $data = $json.Packages }

            if ($null -eq $data -or $data.Count -eq 0) {
              Write-Error "No package found for '$appName' in winget source."
              exit 1
            }

            $pkg = $data | Select-Object -First 1
            $appId = $pkg.PackageIdentifier
          }
          else {
            # Text mode (fallback for older winget)
            $raw = winget search --name "$appName" --source winget --accept-source-agreements --disable-interactivity 2>&1 | Out-String
            $lines = $raw -split "`r?`n"

            # ўЊџМЎѓЎІ Џ©Ў±ЎѓўЖ ЎЃЎЈ ЎђЎѓЎІЏ©ўЖўЖЎѓўЗ (---) ўИ ЎІўЖЎ™ЎЃЎІЎ® ЎІўИўДџМўЖ ЎЃЎЈ ЎѓЎІЎѓўЗ Ў®ЎєЎѓ ЎІЎ≤ ЎҐўЖ
            $sepIndex = -1
            for ($i=0; $i -lt $lines.Length; $i++) {
              if ($lines[$i] -match '^-{2,}\s+-{2,}') { $sepIndex = $i; break }
            }

            if ($sepIndex -eq -1 -or $sepIndex + 1 -ge $lines.Length) {
              Write-Error "Could not parse winget text output. Raw:`n$raw"
              exit 1
            }

            $firstData = $lines[$sepIndex + 1].Trim()
            if ([string]::IsNullOrWhiteSpace($firstData)) {
              # ЎІЏѓЎ± ЎЃЎЈ ЎЃЎІўДџМ Ў®ўИЎѓЎМ ЎЃЎЈ Ў®ЎєЎѓџМ Ў±ЎІ Ў®ЏѓџМЎ±
              $firstData = $lines[$sepIndex + 2].Trim()
            }

            $columns = $firstData -split '\s{2,}' | ForEach-Object { $_.Trim() }
            if ($columns.Count -lt 2) {
              Write-Error "Could not parse ID from line: $firstData"
              exit 1
            }

            $appId = $columns[1]  # Ў≥Ў™ўИўЖ ЎѓўИўЕ = ID
          }

          if ([string]::IsNullOrWhiteSpace($appId)) {
            Write-Error "Could not extract App ID."
            exit 1
          }

          Write-Host "вЬЕ Found App ID: $appId"
          echo "APP_ID_FOUND=$appId" >> $env:GITHUB_OUTPUT

      - name: рЯУ¶ Create Download Directory
        id: create_downloads
        shell: pwsh
        run: |
          $appName = "${{ inputs.app_name }}"
          $safeName = $appName -replace '[\\/:*?"<>|]', '_'
          $dir = Join-Path $env:GITHUB_WORKSPACE "downloads\$safeName"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          echo "APP_FOLDER=$dir" >> $env:GITHUB_OUTPUT
          echo "APP_SAFE_NAME=$safeName" >> $env:GITHUB_OUTPUT

      - name: рЯФљ Download the Application Installer
        shell: pwsh
        run: |
          $id = "${{ steps.find_id.outputs.APP_ID_FOUND }}"
          $dir = "${{ steps.create_downloads.outputs.APP_FOLDER }}"
          Write-Host "Downloading installer for ID: $id"
          winget download --id "$id" --source winget --accept-package-agreements --accept-source-agreements --disable-interactivity --download-directory "$dir"

      - name: рЯІ± Zip & Split if >45MB
        shell: pwsh
        run: |
          $dir = "${{ steps.create_downloads.outputs.APP_FOLDER }}"
          $safeName = "${{ steps.create_downloads.outputs.APP_SAFE_NAME }}"
          $maxSize = 45MB

          $files = Get-ChildItem -Path $dir -File
          if ($files.Count -eq 0) {
            Write-Error "No files downloaded in $dir"
            exit 1
          }

          $totalSize = ($files | Measure-Object Length -Sum).Sum
          if ($totalSize -le $maxSize) {
            Write-Host "Total size <= 45MB. No zip/split required."
            exit 0
          }

          $zipPath = Join-Path $dir "$safeName.zip"
          Compress-Archive -Path "$dir\*" -DestinationPath $zipPath -Force
          $files | Remove-Item -Force

          $zipInfo = Get-Item $zipPath
          if ($zipInfo.Length -le $maxSize) {
            Write-Host "ZIP size under 45MB. No split needed."
            exit 0
          }

          function Split-File {
            param([string]$Path, [int64]$ChunkSize)

            $buffer = New-Object byte[] $ChunkSize
            $index = 1

            $inStream = [System.IO.File]::OpenRead($Path)
            try {
              while (($read = $inStream.Read($buffer, 0, $buffer.Length)) -gt 0) {
                $partPath = "{0}.part{1:00}" -f $Path, $index
                $outStream = [System.IO.File]::Create($partPath)
                try {
                  $outStream.Write($buffer, 0, $read)
                } finally {
                  $outStream.Close()
                }
                $index++
              }
            } finally {
              $inStream.Close()
            }

            Remove-Item $Path -Force
          }

          Split-File -Path $zipPath -ChunkSize $maxSize
          Write-Host "ZIP split into <=45MB parts."

      - name: рЯУ§ Upload Installer as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-installer-${{ inputs.app_name }}
          path: downloads/
