name: 🔎 Find and Download Windows App

# این Workflow به صورت دستی با دریافت نام برنامه اجرا می‌شود
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Enter the application name (e.g., 7-Zip, VLC, PowerShell)'
        required: true
        type: string

jobs:
  find-and-download:
    # اجرا روی یک سرور مجازی با سیستم‌عامل ویندوز
    runs-on: windows-latest

    steps:
      # مرحله ۱: کپی کردن فایل‌های مخزن روی سرور (یک مرحله استاندارد)
      - name: Checkout repository
        uses: actions/checkout@v4

      # مرحله ۲: پیدا کردن ID برنامه از روی نام ورودی کاربر
      - name: Find Application ID from Name
        id: find_app_id
        run: |
          echo "Searching for application ID for: ${{ github.event.inputs.app_name }}"
          # جستجو فقط در منبع اصلی winget برای جلوگیری از خطای msstore
          $search_output = winget search "${{ github.event.inputs.app_name }}" --source winget --accept-source-agreements
          
          # پیدا کردن خطی که مربوط به برنامه مورد نظر است
          $app_line = $search_output | Select-String -Pattern "${{ github.event.inputs.app_name }}" | Select-Object -First 1
          
          if ($app_line) {
            # استخراج ID که معمولاً دومین کلمه در خروجی است
            $app_id_found = ($app_line -split '\s+')[1]
            echo "✅ Found App ID: $app_id_found"
            # ذخیره کردن ID برای استفاده در مرحله بعد
            echo "APP_ID_FOUND=$app_id_found" >> $env:GITHUB_ENV
          } else {
            echo "❌ Could not find an application ID for '${{ github.event.inputs.app_name }}'."
            exit 1
          }

      # مرحله ۳: دانلود فایل نصبی برنامه با استفاده از ID پیدا شده
      - name: Download Application Installer
        if: env.APP_ID_FOUND
        run: |
          echo "Downloading installer for ${{ env.APP_ID_FOUND }}..."
          # ساخت پوشه downloads
          mkdir downloads
          
          # اجرای دستور دانلود و ذخیره فایل در پوشه downloads
          winget download --id "${{ env.APP_ID_FOUND }}" --source winget --accept-source-agreements --download-directory ./downloads
          
          echo "✅ Download complete."

      # مرحله ۴: آپلود پوشه downloads به عنوان یک Artifact در گیت‌هاب
      - name: Upload Installer as Artifact
        if: env.APP_ID_FOUND
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-installer-${{ github.event.inputs.app_name }}
          path: ./downloads/
